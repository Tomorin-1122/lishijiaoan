<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教案工坊 — 教学设计生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#f5f1eb;--sb:#1c1a17;--sb-h:#2a2722;--sb-t:#a09888;--sb-a:#e8dfd3;--card:#fff;--acc:#b8503a;--acc-h:#9e3f2b;--acc-s:#fdf0ec;--grn:#3d6b4f;--grn-s:#eaf2ed;--tx:#2c2418;--tx2:#6b5f50;--tx3:#9a8e7e;--bd:#e6dfd5;--bd2:#f0ebe3;--ib:#eaf2fb;--ibb:#b4cceb;--mb:#faf8f4;--mbd:#d6cdbf;--dng:#c44040;--dng-s:#fef2f2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.sb{width:228px;min-width:228px;background:var(--sb);display:flex;flex-direction:column;height:100vh}
.sb-brand{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-brand h1{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:#e8dfd3;letter-spacing:2px}
.sb-brand p{font-size:10.5px;color:var(--sb-t);margin-top:3px;letter-spacing:1px}
.sb-nav{flex:1;padding:14px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;transition:all .2s;color:var(--sb-t);font-size:13px;border-left:3px solid transparent}
.ni:hover{background:var(--sb-h);color:#ccc3b5}.ni.act{color:var(--sb-a);border-left-color:var(--acc);background:rgba(184,80,58,.08)}
.ni .sn{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;border:1.5px solid var(--sb-t);transition:all .2s;flex-shrink:0}
.ni.act .sn{border-color:var(--acc);background:var(--acc);color:#fff}.ni.dn .sn{border-color:var(--grn);background:var(--grn);color:#fff}
.sb-ft{padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:7px}
.sbb{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:5px;font-size:12px;cursor:pointer;transition:all .2s;border:none;width:100%;justify-content:center;font-family:inherit}
.sbb.p{background:var(--acc);color:#fff}.sbb.p:hover{background:var(--acc-h)}
.sbb.g{background:transparent;color:var(--sb-t);border:1px solid rgba(255,255,255,.1)}.sbb.g:hover{background:var(--sb-h);color:#ccc3b5}
.ma{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.mh{padding:16px 32px;border-bottom:1px solid var(--bd);background:var(--card);display:flex;align-items:center;gap:14px;flex-shrink:0}
.mh h2{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;flex:1}
.hb{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:5px;font-size:12px;cursor:pointer;transition:all .2s;border:1.5px solid var(--bd);background:var(--card);color:var(--tx2);font-family:inherit}
.hb:hover{border-color:var(--tx3);color:var(--tx)}.hb.a{background:var(--acc);color:#fff;border-color:var(--acc)}.hb.a:hover{background:var(--acc-h)}
.hb.gr{background:var(--grn);color:#fff;border-color:var(--grn)}.hb.gr:hover{background:#345c44}
.mb{flex:1;overflow-y:auto;padding:24px 32px 90px}
.fs{margin-bottom:24px}.fst{font-size:13.5px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}.fst::before{content:'';width:3px;height:14px;background:var(--acc);border-radius:2px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px}.fg.fu{grid-column:1/-1}
.fl{font-size:12px;color:var(--tx2);font-weight:500;display:flex;align-items:center;gap:4px}
.fi,.fsel,.ft{padding:8px 11px;border:1.5px solid var(--bd);border-radius:5px;font-size:13px;font-family:inherit;color:var(--tx);background:var(--card);transition:border-color .2s;outline:none;line-height:1.6}
.fi:focus,.fsel:focus,.ft:focus{border-color:var(--acc)}.ft{resize:vertical;min-height:90px}
.fi::placeholder,.ft::placeholder{color:var(--tx3)}.cc{font-size:10.5px;color:var(--tx3);text-align:right;margin-top:1px}
.ot{font-size:10px;color:var(--tx3);font-weight:400;background:var(--bd2);padding:1px 6px;border-radius:3px;letter-spacing:.5px}
.tc{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tch{padding:2px 9px;border-radius:3px;font-size:11px;cursor:pointer;background:var(--acc-s);color:var(--acc);border:1px solid rgba(184,80,58,.15);transition:all .15s;font-family:inherit;white-space:nowrap}
.tch:hover{background:var(--acc);color:#fff}
.fc{background:var(--card);border:1.5px solid var(--bd);border-radius:7px;padding:18px;margin-bottom:14px;transition:border-color .2s}.fc:hover{border-color:var(--tx3)}
.fch{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fcn{width:26px;height:26px;border-radius:5px;background:var(--acc-s);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.fcd{margin-left:auto;width:26px;height:26px;border-radius:4px;border:none;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px}
.fcd:hover{background:var(--dng-s);color:var(--dng)}
/* 块 */
.blk{margin-bottom:8px;border-radius:6px;overflow:hidden}
.blk-act{background:var(--card);border:1px solid var(--bd2);padding:12px}
.blk-mat{background:var(--mb);border:1.5px solid var(--mbd);padding:12px}
.blk-int{background:var(--ib);border:1.5px solid var(--ibb);padding:12px;margin-top:10px}
.blk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.blk-lbl{font-size:11.5px;font-weight:600;color:var(--tx2);letter-spacing:.5px}
.blk-lbl.mat{font-family:'FangSong','STFangSong','仿宋','Noto Serif SC',serif;color:#8a7a65;font-size:12.5px}
.blk-lbl.int{color:#4a7db5}
.blk-del{width:24px;height:24px;border-radius:4px;border:none;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px}
.blk-del:hover{background:var(--dng-s);color:var(--dng)}
.blk-ins{display:flex;gap:5px;margin-top:8px}
.blk-ins-btn{padding:3px 10px;border-radius:3px;border:1px dashed var(--bd);background:transparent;color:var(--tx3);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.blk-ins-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}
.mta{width:100%;border:1px solid var(--mbd);border-radius:4px;padding:7px 9px;font-size:13px;font-family:'FangSong','STFangSong','仿宋','Noto Serif SC',serif;line-height:1.8;background:#fff;color:var(--tx);resize:vertical;min-height:60px;outline:none;transition:border-color .2s}
.mta:focus{border-color:var(--acc)}.mta::placeholder{color:var(--tx3);font-family:'Noto Sans SC',sans-serif;font-size:11.5px}
.ita{min-height:100px!important;background:transparent!important;border-color:transparent!important}
.ita:focus{border-color:var(--ibb)!important}
.iub{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:4px;border:1.5px dashed var(--mbd);background:transparent;color:var(--tx3);font-size:11.5px;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:5px}
.iub:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}
.ipw{margin-top:6px;position:relative;display:inline-block}.ipw img{max-width:100%;max-height:180px;border-radius:3px;border:1px solid var(--bd);display:block}
.ia{display:flex;gap:4px;margin-top:5px}
.iab{padding:2px 8px;border-radius:3px;border:1px solid var(--bd);background:var(--card);font-size:10.5px;cursor:pointer;color:var(--tx2);transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.iab:hover{border-color:var(--tx3)}.iab.d:hover{background:var(--dng-s);color:var(--dng);border-color:var(--dng)}
.ab{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:2px dashed var(--bd);border-radius:7px;background:transparent;color:var(--tx3);font-size:12.5px;cursor:pointer;transition:all .2s;width:100%;font-family:inherit}
.ab:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}.ab.sm{padding:7px;font-size:11.5px;margin-top:7px}
.bn{position:fixed;bottom:0;left:228px;right:0;background:var(--card);border-top:1px solid var(--bd);padding:12px 32px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.tplc{border:2px solid var(--bd);border-radius:9px;cursor:pointer;transition:all .25s;overflow:hidden;background:var(--card)}
.tplc:hover{border-color:var(--tx3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}.tplc.sl{border-color:var(--acc);box-shadow:0 0 0 3px rgba(184,80,58,.12)}
.tpm{height:200px;padding:16px;overflow:hidden}
.tpl{padding:12px 16px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.tpl h3{font-size:13.5px;font-weight:600}.tpl span{font-size:11.5px;color:var(--tx3)}
.po{position:fixed;inset:0;background:rgba(20,18,14,.7);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.po.sh{opacity:1;pointer-events:auto}
.pc{background:#e8e4de;border-radius:7px;padding:28px;position:relative;max-width:840px;width:95%;max-height:90vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .3s}
.po.sh .pc{transform:translateY(0)}
.pt{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;flex-shrink:0}
.pdw{flex:1;overflow-y:auto;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.1);border-radius:3px}
.px{position:absolute;top:-11px;right:-11px;width:30px;height:30px;border-radius:50%;background:var(--sb);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:5;transition:transform .2s}.px:hover{transform:scale(1.1)}
.tst{position:fixed;top:22px;right:22px;z-index:200;padding:10px 18px;border-radius:7px;font-size:12.5px;display:flex;align-items:center;gap:7px;transform:translateX(120%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tst.sh{transform:translateX(0)}.tst.ok{background:var(--grn);color:#fff}.tst.er{background:var(--dng);color:#fff}.tst.in{background:var(--sb);color:var(--sb-a)}
.el{position:fixed;inset:0;background:rgba(20,18,14,.6);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.el.sh{opacity:1;pointer-events:auto}
.esp{width:34px;height:34px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.el p{color:#e8dfd3;font-size:13.5px}
.oi{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px}.oi .ft{min-height:48px;flex:1}
.orm{width:30px;height:30px;border-radius:4px;border:none;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;margin-top:3px;flex-shrink:0}
.orm:hover{background:var(--dng-s);color:var(--dng)}
.asv{font-size:10.5px;color:var(--tx3);display:flex;align-items:center;gap:3px}
.asv .dt{width:4px;height:4px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div style="display:flex;height:100vh">
<aside class="sb"><div class="sb-brand"><h1>教案工坊</h1><p>教学设计生成器</p></div><nav class="sb-nav" id="nav"></nav><div class="sb-ft"><div class="asv" id="asi" style="display:none;padding:0 3px 3px"><span class="dt"></span>已自动保存</div><button class="sbb g" onclick="loadEx()"><i class="fa-solid fa-flask" style="font-size:10px"></i> 加载示例</button><button class="sbb g" onclick="clrAll()"><i class="fa-solid fa-rotate-left" style="font-size:10px"></i> 重置</button><button class="sbb p" onclick="showPV()"><i class="fa-solid fa-eye" style="font-size:10px"></i> 预览</button></div></aside>
<div class="ma"><div class="mh"><h2 id="stT"></h2><div style="display:flex;gap:8px"><button class="hb" onclick="showPV()"><i class="fa-regular fa-eye"></i> 预览</button><button class="hb gr" onclick="expPDF()"><i class="fa-solid fa-file-pdf"></i> 导出PDF</button></div></div><div class="mb" id="mB"></div><div class="bn" id="bN"><button class="hb" id="pB" onclick="pS()" style="visibility:hidden"><i class="fa-solid fa-arrow-left"></i> 上一步</button><button class="hb a" id="nB" onclick="nS()">下一步 <i class="fa-solid fa-arrow-right"></i></button></div></div>
</div>
<div class="po" id="pO"><div class="pc"><button class="px" onclick="hidPV()"><i class="fa-solid fa-xmark"></i></button><div class="pt"><button class="hb" onclick="hidPV()">关闭</button><button class="hb gr" onclick="expPDF()"><i class="fa-solid fa-file-pdf"></i> 导出PDF</button></div><div class="pdw" id="pDW"></div></div></div>
<div class="el" id="eL"><div class="esp"></div><p>正在生成PDF文档…</p></div>
<div class="tst" id="tst"></div>
<input type="file" id="gFI" accept="image/*" style="display:none">

<script>
const ST=[{id:'template',l:'选择模板',i:'fa-palette'},{id:'basic',l:'基础信息',i:'fa-file-lines'},{id:'macro',l:'宏观设计',i:'fa-sitemap'},{id:'flow',l:'教学流程',i:'fa-arrows-spin'},{id:'summary',l:'总结反馈',i:'fa-flag-checkered'}];
const TAGS=['【讲述】','【问题】','【设问】','【讲授】','【过渡】','【PPT展示】','【板书】','【任务】'];
const CN=['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
let S={tpl:'classic',cs:0,basic:{title:'',ct:'新授课',dur:'一课时',sub:'',grd:''},macro:{ti:'',ta:'',sa:'',obj:[''],kp:'',dp:'',mf:''},flow:[{name:'导入新课',blocks:[{t:'a',x:''},{t:'i',x:''}]}],sum:{con:'',hw:'',bd:'',bi:null,ref:''}};
let _st=null,_gf=null;

function init(){ldSt();rNav();rSt();uNav()}
function rNav(){document.getElementById('nav').innerHTML=ST.map((s,i)=>{let c='ni';if(i===S.cs)c+=' act';else if(i<S.cs)c+=' dn';return`<div class="${c}" onclick="gS(${i})"><span class="sn">${i<S.cs?'<i class="fa-solid fa-check" style="font-size:9px"></i>':(i+1)}</span><span>${s.l}</span></div>`}).join('')}
function uNav(){const p=document.getElementById('pB'),n=document.getElementById('nB');p.style.visibility=S.cs===0?'hidden':'visible';if(S.cs===ST.length-1){n.innerHTML='<i class="fa-solid fa-eye"></i> 预览文档';n.onclick=showPV}else{n.innerHTML='下一步 <i class="fa-solid fa-arrow-right"></i>';n.onclick=nS}document.getElementById('stT').textContent=ST[S.cs].l}
function gS(i){S.cs=i;rNav();rSt();uNav();document.getElementById('mB').scrollTop=0}
function pS(){if(S.cs>0)gS(S.cs-1)}function nS(){if(S.cs<ST.length-1)gS(S.cs+1)}
function rSt(){const b=document.getElementById('mB');const id=ST[S.cs].id;b.innerHTML=id==='template'?rTpl():id==='basic'?rBas():id==='macro'?rMac():id==='flow'?rFlw():rSum();bE()}

/* 模板 */
function rTpl(){return`<div style="max-width:700px"><p style="color:var(--tx2);font-size:13px;margin-bottom:22px;line-height:1.8">选择一种文档排版风格，仅影响最终PDF视觉呈现。</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:18px"><div class="tplc ${S.tpl==='classic'?'sl':''}" onclick="sT('classic')"><div class="tpm" style="background:#fff"><div style="text-align:center;font-size:9px;font-weight:700;margin-bottom:10px;font-family:'Noto Serif SC',serif">教学设计</div><div style="margin-bottom:8px"><div style="font-size:7px;font-weight:700;color:#b8503a;margin-bottom:3px">◆ 教材分析</div><div style="height:3px;background:#e0dcd6;border-radius:1px;margin-bottom:2px;width:88%"></div></div><div style="border:1px solid #ccc;border-radius:3px;padding:4px;margin-bottom:5px;background:#faf8f4"><div style="font-size:5.5px;font-weight:600;color:#8a7a65;font-family:FangSong,serif">材料一</div><div style="height:2px;background:#ddd;margin-top:2px;width:80%"></div></div><div style="height:3px;background:#e0dcd6;border-radius:1px;margin-bottom:2px;width:90%"></div><div style="background:#eaf2fb;border-left:2px solid #b4cceb;padding:3px;border-radius:0 2px 2px 0;margin-top:4px"><div style="height:2px;background:#c8ddef;width:75%"></div></div></div><div class="tpl"><div><h3>经典学术型</h3><span>边框区块 / ◆ 标题 / 蓝色意图框</span></div>${S.tpl==='classic'?'<i class="fa-solid fa-circle-check" style="color:var(--acc);font-size:16px"></i>':''}</div></div><div class="tplc ${S.tpl==='modern'?'sl':''}" onclick="sT('modern')"><div class="tpm" style="background:#fff"><div style="font-size:10px;font-weight:900;margin-bottom:12px;padding-left:5px;border-left:3px solid #b8503a;font-family:'Noto Serif SC',serif">教学设计</div><div style="margin-bottom:8px"><div style="font-size:7px;font-weight:600;margin-bottom:3px;padding-left:5px;border-left:2px solid #3d6b4f;color:#3d6b4f">教材分析</div><div style="height:3px;background:#eee;border-radius:1px;margin-bottom:2px;width:88%"></div></div><div style="border-left:2px solid #d6cdbf;background:#faf8f5;border-radius:0 4px 4px 0;padding:4px 6px;margin-bottom:5px"><div style="font-size:5.5px;font-weight:600;color:#8a7a65;font-family:FangSong,serif">材料一</div><div style="height:2px;background:#e8e4dd;margin-top:2px;width:80%"></div></div><div style="height:3px;background:#eee;border-radius:1px;margin-bottom:2px;width:90%"></div><div style="background:#f0f4f0;border-left:2px solid #3d6b4f;padding:3px;border-radius:0 3px 3px 0;margin-top:4px"><div style="height:2px;background:#d0e0d0;width:75%"></div></div></div><div class="tpl"><div><h3>现代简约型</h3><span>圆角卡片 / 色条标题 / 绿色意图框</span></div>${S.tpl==='modern'?'<i class="fa-solid fa-circle-check" style="color:var(--acc);font-size:16px"></i>':''}</div></div></div></div>`}
function sT(t){S.tpl=t;rSt();aSv()}

/* 基础信息 */
function rBas(){const b=S.basic;return`<div style="max-width:600px"><div class="fs"><div class="fst">课题信息</div><div class="fg fu"><label class="fl">课题名称</label><input class="fi" data-f="basic.title" value="${e(b.title)}" placeholder="例：从隋唐盛世到五代十国"></div></div><div class="fs"><div class="fst">课时安排</div><div class="fr"><div class="fg"><label class="fl">课型</label><select class="fsel" data-f="basic.ct">${['新授课','复习课','讲评课','实验课','讨论课','实践活动课'].map(o=>`<option ${b.ct===o?'selected':''}>${o}</option>`).join('')}</select></div><div class="fg"><label class="fl">教学时间</label><input class="fi" data-f="basic.dur" value="${e(b.dur)}" placeholder="一课时"></div></div><div class="fr"><div class="fg"><label class="fl">学科</label><input class="fi" data-f="basic.sub" value="${e(b.sub)}" placeholder="历史"></div><div class="fg"><label class="fl">年级</label><input class="fi" data-f="basic.grd" value="${e(b.grd)}" placeholder="高一"></div></div></div></div>`}

/* 宏观设计 */

function rBlk(si,bi,bk){

function insT(si,bi,tag){const ta=document.querySelector(`[data-f="flow.${si}.blocks.${bi}.x"]`);if(!ta)return;const s=ta.selectionStart,en=ta.selectionStart,v=ta.value;const pf=(s>0&&v[s-1]!=='\n')?'\n':'';ta.value=v.substring(0,s)+pf+tag+v.substring(en);const np=s+pf.length+tag.length;ta.selectionStart=ta.selectionEnd=np;ta.focus();ta.dispatchEvent(new Event('input'))}

function hI(si,bi,inp){const file=inp.files[0];if(!file)return;if(file.size>10*1024*1024){tst('图片不能超过10MB','er');inp.value='';return}cmpI(file).then(b64=>{S.flow[si].blocks[bi].img=b64;rSt();aSv();tst('图片已添加','ok')}).catch(()=>tst('图片处理失败','er'));inp.value=''}

function cmpI(file,mw=600,q=0.6){return new Promise(res=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>mw){h=h*mw/w;w=mw}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.onerror=()=>res(null);img.src=ev.target.result};r.readAsDataURL(file)})}

function rClDoc(){
  const b=S.basic,m=S.macro,f=S.flow,s=S.sum,mm=matMap();

  h.push(`<div class="${c}">`);

/* PDF导出 */
async function expPDF(){
  hidPV();
  const ld=document.getElementById('eL');ld.classList.add('sh');
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  await document.fonts.ready;

  const ct=document.createElement('div');
  ct.style.cssText='position:absolute;left:0;top:0;z-index:9999;visibility:hidden;width:794px;background:#fff;';
  ct.innerHTML=docHTML();
  document.body.appendChild(ct);

  // 等待图片
  const imgs=ct.querySelectorAll('img');
  await Promise.all(Array.from(imgs).map(img=>{if(img.complete)return Promise.resolve();return new Promise(r=>{img.onload=r;img.onerror=r})}));
  await new Promise(r=>setTimeout(r,300));

  const title=S.basic.title||'教学设计';
  try{
    await html2pdf().set({
      margin:[10,10,10,10],
      filename:title+'.pdf',
      image:{type:'jpeg',quality:0.92},
      html2canvas:{scale:2,useCORS:true,allowTaint:true,letterRendering:true,logging:false,backgroundColor:'#ffffff',width:794,windowWidth:794},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait',compress:true},
      pagebreak:{mode:['avoid-all','css','legacy'],before:['.dc-s2','.dm-s2','.dc-sp','.dm-sp']}
    }).from(ct).save();
    tst('PDF已生成并开始下载','ok');
  }catch(err){
    console.error('PDF导出失败:',err);
    tst('PDF生成遇到问题，正在尝试打印方式…','in');
    const pw=window.open('','_blank');
    if(pw){pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${e(title)}</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>@page{margin:12mm}body{margin:0}img{max-width:100%}${dCSS()}</style></head><body>${rDoc()}</body></html>`);pw.document.close();setTimeout(()=>{try{pw.print()}catch(ex){}},800)}
  }finally{document.body.removeChild(ct);ld.classList.remove('sh')}
}

    {name:'课堂收束',blocks:[

  S.sum={con:'本课以大运河为主线，串联隋朝兴亡、唐朝盛世、唐末乱象与五代十国四个阶段。大运河见证了近四百年的王朝兴衰，帮助学生从一条河流的视角理解历史发展的客观规律。',hw:'思考：在后世的宋元明清时期，大运河又经历了怎样的命运？它又是如何见证王朝兴亡的？',bd:'从隋唐盛世到五代十国\n├─ 隋朝（581-618）\n│   ├─ 开凿运河 ── 通南北\n│   └─ 滥用民力 ── 致灭亡\n├─ 唐朝（618-907）\n│   ├─ 贞观之治\n│   ├─ 开元盛世 ── 运河通\n│   ├─ 民族交融 ── 安边疆\n│   ├─ 安史之乱 ── 由盛转衰\n│   └─ 藩镇割据 / 黄巢起义\n└─ 五代十国\n    └─ 藩镇割据的延续 ── 统一趋势',bi:null,ref:''};
